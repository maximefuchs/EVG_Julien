<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion Admin – EVG</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <div class="login-card card p-4">
    <div class="login-logo">🏆 EVG</div>
    <div class="login-sub">Administration</div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">

      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <input type="password" name="password" id="password-input" class="form-control" required>
          <button type="button" class="btn btn-outline-secondary" id="toggle-password"
                  style="border-color:#444;color:#aaa;" title="Afficher / masquer">
            👁
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-gold w-100">Se connecter</button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('index') }}" class="small text-muted">← Retour au classement</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const token = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
  document.querySelectorAll('form[method="POST"], form[method="post"]').forEach(function (form) {
    if (!form.querySelector('input[name="csrf_token"]')) {
      const input = document.createElement('input');
      input.type = 'hidden'; input.name = 'csrf_token'; input.value = token;
      form.prepend(input);
    }
  });
  document.getElementById('toggle-password').addEventListener('click', function () {
    const input = document.getElementById('password-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  });
</script>
</body>
</html>
