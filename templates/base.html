<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EVG{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="{{ url_for('index') }}">🏆 EVG</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}">Classement</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'nba_jeu' %}active{% endif %}"
             href="{{ url_for('nba_jeu') }}">🏀 NBA</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        {% if session.get('admin_id') %}
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}"
               href="{{ url_for('admin_dashboard') }}">Administration</a>
          </li>
          <li class="nav-item">
            <form method="POST" action="{{ url_for('admin_deconnexion') }}" class="m-0">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button type="submit" class="nav-link" style="background:none;border:none;">Déconnexion</button>
            </form>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('admin_connexion') }}">Admin</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-0">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
